<!DOCTYPE html>

<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#09090c" />
  <title>Для тебя</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0d;
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 42px;
      line-height: 1;
      margin: 10px 0;
    }

    p {
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
    }

    .heart {
      font-size: 60px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .heart:active {
      transform: scale(0.9);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 999px;
      border: none;
      margin-top: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: linear-gradient(180deg,#f1d59d,#d9b46b);
      color: black;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .timeline div {
      margin-bottom: 12px;
    }

    .map {
      height: 200px;
      border-radius: 20px;
      background: linear-gradient(180deg,#1a1a22,#111);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    .hidden {
      display: none;
    }
  </style>

</head>

<body>
  <div class="container">

```
<div class="card">
  <h1>У меня есть план</h1>
  <p>на 4 апреля… и он про нас</p>

  <div class="heart" onclick="changeText()">♥</div>
  <p id="text">Нажми на сердце</p>
</div>

<div class="card">
  <h2>Что будет</h2>
  <p>ГЭС-2 → набережная → Музеон → Сыроварня</p>
</div>

<div class="card map">
  маршрут вдоль реки (без переездов)
</div>

<div class="card timeline">
  <div><b>12:00</b> — ГЭС-2</div>
  <div><b>12:50</b> — прогулка</div>
  <div><b>13:20</b> — Музеон</div>
  <div><b>14:00</b> — Сыроварня</div>
</div>

<div class="card">
  <p>Пойдешь со мной?</p>
  <button class="btn primary" onclick="accept()">Да ♥</button>
  <button class="btn secondary" onclick="more()">А что за план?</button>

  <p id="answer" class="hidden"></p>
</div>
```

  </div>

  <script>
    const texts = [
      "Я хочу провести этот день с тобой",
      "Без суеты, просто вдвоем",
      "И закончить всё в Сыроварне"
    ];

    let i = 0;

    function changeText() {
      i = (i + 1) % texts.length;
      document.getElementById("text").innerText = texts[i];
      if (navigator.vibrate) navigator.vibrate(20);
    }

    function accept() {
      document.getElementById("answer").classList.remove("hidden");
      document.getElementById("answer").innerText = "Тогда это официально свидание ♥";
    }

    function more() {
      document.getElementById("answer").classList.remove("hidden");
      document.getElementById("answer").innerText = "Я всё продумал. Тебе понравится :)";
    }
  </script>

</body>
</html>
